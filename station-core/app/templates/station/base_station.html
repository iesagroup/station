<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>{% block title %}TrackLine - Станция{% endblock %}</title>

  <!-- Favicons -->
  <link href="{{ url_for('static', path='assets/img/favicon.png') }}" rel="icon">
  <link href="{{ url_for('static', path='assets/img/apple-touch-icon.png') }}" rel="apple-touch-icon">

  <!-- Vendor CSS Files -->
  <link href="{{ url_for('static', path='assets/vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', path='assets/vendor/bootstrap-icons/bootstrap-icons.css') }}" rel="stylesheet">

  <!-- Template Main CSS File -->
  <link href="{{ url_for('static', path='assets/css/style.css') }}" rel="stylesheet">

  <!-- Station CSS -->
  <link href="{{ url_for('static', path='css/station.css') }}" rel="stylesheet">
</head>

<body class="station-body">
  {% block content %}{% endblock %}

  <!-- Vendor JS Files -->
  <script src="{{ url_for('static', path='assets/vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
